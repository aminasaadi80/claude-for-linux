name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Three stages so the release reliably auto-publishes: one job creates a draft,
# the platform matrix uploads its artifacts to that draft, and a final job flips
# it to published. (tauri-action's own releaseDraft:false is unreliable when two
# matrix jobs race on the same tag — the release would stay a draft.)
jobs:
  create-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create the draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Claude for Linux ${tag}`,
              body:
                'Native Claude Code desktop app. Download the `.deb`/`.AppImage` ' +
                '(Linux) or the `.dmg` (macOS) below. The macOS build is unsigned — ' +
                'on first launch, right-click the app → Open, or run ' +
                '`xattr -cr "/Applications/Claude for Linux.app"`.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — .deb + portable .AppImage
          - platform: ubuntu-24.04
            args: "--bundles deb appimage"
            rust-targets: ""
          # macOS — universal .dmg (Apple Silicon + Intel)
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles dmg"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build and upload to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs: [create-release, build]
    steps:
      - name: Publish the release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });
