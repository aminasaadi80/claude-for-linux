name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # required for tauri-action to create the release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — .deb + portable .AppImage
          - platform: ubuntu-24.04
            args: "--bundles deb appimage"
            rust-targets: ""
          # macOS — universal .dmg (Apple Silicon + Intel)
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles dmg"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude for Linux ${{ github.ref_name }}"
          releaseBody: "Native Claude Code desktop app. Download the `.deb`/`.AppImage` (Linux) or the `.dmg` (macOS) below. The macOS build is unsigned — on first launch, right-click the app → Open, or run `xattr -cr \"/Applications/Claude for Linux.app\"`."
          releaseDraft: false
          args: ${{ matrix.args }}
